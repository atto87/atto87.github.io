workflows:
  ios-adhoc:
    name: iOS Ad Hoc
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.zareg.hanaQuizZukan
      vars:
        BUNDLE_ID: "com.zareg.hanaQuizZukan"
    scripts:
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Fetch iOS signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_ADHOC \
            --create
      - name: Use iOS signing files
        script: |
          keychain add-certificates
          xcode-project use-profiles
      - name: Install Flutter dependencies
        script: |
          flutter pub get
      - name: Run tests
        script: |
          flutter test
      - name: Build Ad Hoc IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
